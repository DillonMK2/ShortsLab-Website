<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ShortsLab Logo Export</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #080808;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .logo {
      font-family: 'Sora', sans-serif;
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .shorts {
      color: #ffffff;
    }
    .lab {
      background: linear-gradient(135deg, #8b5cf6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Export box - screenshot this */
    .export-box {
      background: #080808;
      padding: 20px 40px;
      border: 2px dashed #333;
    }
  </style>
</head>
<body>
  <div class="export-box">
    <span class="logo">
      <span class="shorts">Shorts</span><span class="lab">Lab</span>
    </span>
  </div>
</body>
</html>
